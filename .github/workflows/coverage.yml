name: Coverage

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  coverage:
    name: Code Coverage
    runs-on: macos-15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Run tests with coverage
        run: swift test --enable-code-coverage --parallel

      - name: Generate coverage report
        id: coverage
        run: |
          PROFDATA="$(find .build -name default.profdata -type f | head -1)"
          if [[ -z "$PROFDATA" ]]; then
            echo "::error::No profdata file found — did 'swift test --enable-code-coverage' run?"
            exit 1
          fi

          # Locate the test binary; SPM may place it inside an xctest bundle or directly
          # in the build directory depending on Swift/Xcode version.
          TEST_BIN="$(find .build -type f -name "TidyGmailTests" -not -path "*.dSYM/*" 2>/dev/null | head -1)"
          if [[ -z "$TEST_BIN" ]]; then
            echo "::error::Could not find TidyGmailTests binary under .build/"
            exit 1
          fi

          EXCLUDE='\.build|Tests/|main\.swift'

          REPORT=$(xcrun llvm-cov report "$TEST_BIN" \
            -instr-profile="$PROFDATA" \
            -ignore-filename-regex="$EXCLUDE")

          TOTAL=$(echo "$REPORT" | tail -1 | awk '{for(i=1;i<=NF;i++) if($i ~ /^[0-9]+\.[0-9]+%$/) last=$i} END{print last}')

          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"

          {
            echo "## Code Coverage Report"
            echo ""
            echo "**Total line coverage: $TOTAL**"
            echo ""
            echo '```'
            echo "$REPORT"
            echo '```'
            echo ""
            echo "_Target: ≥ 80% overall; 100% on Auth and BulkOps delete paths._"
          } > coverage-comment.md

      - name: Post coverage comment
        uses: marocchino/sticky-pull-request-comment@52423e01640425a022ef5fd42c6fb5f633a02728 # v2
        with:
          path: coverage-comment.md
